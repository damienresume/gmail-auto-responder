apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: gmail-autoresponder
spec:
  template:
    spec:
      containers:
        - name: migrate
          image: ghcr.io/example/gmail-autoresponder-app:latest
          command: ["php", "artisan", "migrate", "--force"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
      restartPolicy: Never
  backoffLimit: 3
