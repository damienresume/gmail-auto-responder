apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: gmail-autoresponder
data:
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: https://api.example.com
  FRONTEND_URL: https://app.example.com
  DB_CONNECTION: pgsql
  DB_HOST: postgres-service
  DB_PORT: "5432"
  DB_DATABASE: gmail_autoresponder
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  LLM_PROVIDER: groq
  LLM_MODEL: llama-3.1-8b
  LOG_CHANNEL: stderr
  HORIZON_PREFIX: gmail-autoresponder:
