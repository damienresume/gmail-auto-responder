apiVersion: apps/v1
kind: Deployment
metadata:
  name: horizon
  namespace: gmail-autoresponder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: horizon
  template:
    metadata:
      labels:
        app: horizon
    spec:
      containers:
        - name: horizon
          image: ghcr.io/example/gmail-autoresponder-app:latest
          command: ["php", "artisan", "horizon"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
